<!DOCTYPE html>
<html lang="en">
<head th:replace="~{fragments/headerelement :: headerelement}"/>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="~{fragments/header :: header}"/>

    <main class="container py-4" th:object="${font}">
        <section class="rounded-4 p-4 mb-4">
            <div class="d-flex gap-4">
                <div class="rounded-3 d-flex align-items-center justify-content-center flex-shrink-0"
                     style="width:160px; height:160px; background-color: #131313;">
                    <span class="text-white text-center" style="font-size:2.5rem; background-color: #131313" th:text="*{name}"></span>
                </div>

                <div class="flex-grow-1">
                    <section class="d-flex align-items-center gap-2 mb-1">
                        <h2 class="fw-bold mb-0" th:text="*{name}"></h2>
                    </section>

                    <p class="text-secondary mb-3"
                       th:text="|*{category} &bull; *{year}|"></p>

                    <section class="d-flex gap-2 mb-4">
                        <button class="btn btn-primary btn-sm">Copy CSS</button>
                        <button class="btn btn-outline-secondary btn-sm">Download Family</button>
                    </section>

                    <hr style="border-color:#2a2d3a;">

                    <section class="row g-2">
                        <p class="col-6 col-md-3 text-secondary">Designer</p>

                        <article class="col-6 col-md-3">
                            <a class="text-primary text-decoration-none"
                               th:href="@{/designer/{id}(id=*{designer?.id})}"
                               th:text="*{designer?.name}"></a>
                        </article>

                        <p class="col-6 col-md-3 text-secondary">License</p>
                        <p class="col-6 col-md-3 fw-bold" th:text="*{license}"></p>

                        <p class="col-6 col-md-3 text-secondary">Available Styles</p>
                        <p class="col-6 col-md-3 fw-bold">Bold, Italic, Regular</p>
                    </section>
                </div>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"/>
</body>
</html>
